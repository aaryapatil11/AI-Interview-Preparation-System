<!DOCTYPE html>
<html>
<head>
    <title>Interview Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Interview Feedback</h1>

    <div class="nav">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/mock_interview">Try Again</a>
        <a href="/logout">Logout</a>

        <p>{{ answer }}</p>

    <h2>AI Feedback</h2>

</div>

</body>
</html>
